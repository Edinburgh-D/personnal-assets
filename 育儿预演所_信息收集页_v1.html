<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>育儿预演所 · 开始之前</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-appearance: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F5F0EB;
            min-height: 100vh;
            color: #1A1A1A;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* 顶部品牌区 */
        .brand-header {
            text-align: center;
            padding: 48px 24px 24px;
            animation: fadeInDown 0.6s ease-out;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            color: #FF8C42;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }

        .brand-hint {
            font-size: 14px;
            color: #666;
            background: rgba(255,140,66,0.08);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            line-height: 1.5;
        }

        /* 聊天容器 */
        .chat-container {
            padding: 16px 20px 120px;
            max-width: 420px;
            margin: 0 auto;
        }

        /* 消息气泡 */
        .msg-bubble {
            background: #fff;
            border-radius: 20px;
            padding: 20px 20px 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            opacity: 0;
            transform: translateY(20px);
            animation: bubbleIn 0.5s ease-out forwards;
        }

        .msg-bubble.delay-1 { animation-delay: 0.3s; }
        .msg-bubble.delay-2 { animation-delay: 0.6s; }
        .msg-bubble.delay-3 { animation-delay: 0.9s; }

        .msg-label {
            font-size: 13px;
            color: #FF8C42;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .msg-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #FF8C42;
            border-radius: 50%;
        }

        .msg-question {
            font-size: 16px;
            font-weight: 500;
            color: #1A1A1A;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        /* 胶囊选项 */
        .pill-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill-btn {
            padding: 10px 20px;
            border-radius: 24px;
            border: 1.5px solid #E8E8E8;
            background: #fff;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .pill-btn:active {
            transform: scale(0.96);
        }

        .pill-btn.selected {
            background: #FF8C42;
            border-color: #FF8C42;
            color: #fff;
            font-weight: 500;
        }

        /* 条件出现的字段 */
        .conditional-block {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .conditional-block.show {
            max-height: 500px;
            opacity: 1;
            margin-top: 12px;
        }

        .conditional-block .msg-bubble {
            animation: none;
            opacity: 1;
            transform: none;
        }

        /* 多选提示 */
        .multi-hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
            margin-bottom: -4px;
        }

        /* 底部固定按钮区 */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #F5F0EB 70%, transparent);
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 28px;
            border: none;
            background: #FF8C42;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(255,140,66,0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(255,140,66,0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            border: 1.5px solid #ccc;
            background: transparent;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-secondary:active {
            transform: scale(0.98);
            background: rgba(0,0,0,0.02);
        }

        /* 选中摘要 */
        .selection-summary {
            text-align: center;
            padding: 8px 20px 4px;
            font-size: 13px;
            color: #FF8C42;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .selection-summary.show {
            opacity: 1;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 小装饰 */
        .decoration-emoji {
            font-size: 36px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <!-- 品牌头 -->
    <div class="brand-header">
        <div class="decoration-emoji">🧸</div>
        <div class="brand-logo">育儿预演所</div>
        <div class="brand-subtitle">Parenting Rehearsal Lab</div>
        <div class="brand-hint">帮我们更精准地为你推荐场景</div>
    </div>

    <!-- 聊天区 -->
    <div class="chat-container">
        <!-- 问题1：婚姻状态 -->
        <div class="msg-bubble delay-1">
            <div class="msg-label">问题 1/2</div>
            <div class="msg-question">你的婚姻状态是？</div>
            <div class="pill-options" data-question="marriage">
                <button class="pill-btn" data-value="single">未婚</button>
                <button class="pill-btn" data-value="married">已婚</button>
                <button class="pill-btn" data-value="divorced">离异</button>
                <button class="pill-btn" data-value="remarried">再婚</button>
            </div>
        </div>

        <!-- 问题2：是否有孩子 -->
        <div class="msg-bubble delay-2">
            <div class="msg-label">问题 2/2</div>
            <div class="msg-question">目前有孩子吗？</div>
            <div class="pill-options" data-question="hasChild">
                <button class="pill-btn" data-value="none">还没有</button>
                <button class="pill-btn" data-value="one">有 1 个</button>
                <button class="pill-btn" data-value="multiple">有 2 个及以上</button>
            </div>
        </div>

        <!-- 条件问题3：孩子年龄（多选） -->
        <div class="conditional-block" id="ageBlock">
            <div class="msg-bubble">
                <div class="msg-label">补充一下</div>
                <div class="msg-question">孩子的年龄段是？<br><span style="font-size:13px;color:#999;">（可多选）</span></div>
                <div class="pill-options" data-question="childAge" data-multiple="true">
                    <button class="pill-btn" data-value="0-3">0-3 岁</button>
                    <button class="pill-btn" data-value="4-6">4-6 岁</button>
                    <button class="pill-btn" data-value="7-12">7-12 岁</button>
                    <button class="pill-btn" data-value="12+">12 岁以上</button>
                </div>
                <div class="multi-hint">💡 多个孩子可以选多个年龄段</div>
            </div>
        </div>
    </div>

    <!-- 选中摘要 -->
    <div class="selection-summary" id="summary"></div>

    <!-- 底部按钮 -->
    <div class="bottom-actions">
        <button class="btn-primary" id="btnStart" onclick="handleStart()">
            开始预演
        </button>
        <button class="btn-secondary" id="btnSkip" onclick="handleSkip()">
            暂不填写，直接开始
        </button>
    </div>

    <script>
        // 状态存储
        const state = {
            marriage: null,
            hasChild: null,
            childAge: []
        };

        // 绑定所有pill按钮点击
        document.querySelectorAll('.pill-options').forEach(container => {
            const question = container.dataset.question;
            const isMultiple = container.dataset.multiple === 'true';

            container.querySelectorAll('.pill-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const value = btn.dataset.value;

                    if (isMultiple) {
                        // 多选逻辑
                        if (btn.classList.contains('selected')) {
                            btn.classList.remove('selected');
                            state[question] = state[question].filter(v => v !== value);
                        } else {
                            btn.classList.add('selected');
                            state[question].push(value);
                        }
                    } else {
                        // 单选逻辑
                        container.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        state[question] = value;

                        // 触发条件显示：选了"有孩子"才显示年龄
                        if (question === 'hasChild') {
                            const ageBlock = document.getElementById('ageBlock');
                            if (value === 'one' || value === 'multiple') {
                                ageBlock.classList.add('show');
                                // 滚动到底部让用户看到新内容
                                setTimeout(() => {
                                    ageBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }, 300);
                            } else {
                                ageBlock.classList.remove('show');
                                // 清空年龄选择
                                state.childAge = [];
                                document.querySelectorAll('[data-question="childAge"] .pill-btn').forEach(b => b.classList.remove('selected'));
                            }
                        }
                    }

                    updateSummary();
                });
            });
        });

        // 更新底部摘要
        function updateSummary() {
            const parts = [];
            if (state.marriage) {
                const map = { single: '未婚', married: '已婚', divorced: '离异', remarried: '再婚' };
                parts.push(map[state.marriage]);
            }
            if (state.hasChild) {
                const map = { none: '无孩子', one: '1个孩子', multiple: '多个孩子' };
                parts.push(map[state.hasChild]);
            }
            if (state.childAge.length > 0) {
                parts.push('孩子' + state.childAge.join('、'));
            }

            const summaryEl = document.getElementById('summary');
            if (parts.length > 0) {
                summaryEl.textContent = '已选择：' + parts.join(' · ');
                summaryEl.classList.add('show');
            } else {
                summaryEl.classList.remove('show');
            }
        }

        // 开始预演
        function handleStart() {
            // 至少要有婚姻状态和是否有孩子才能"开始预演"
            if (!state.marriage || !state.hasChild) {
                alert('请先回答上面两个问题~');
                return;
            }

            // 如果选了有孩子但没选年龄，提示一下但不阻止
            if ((state.hasChild === 'one' || state.hasChild === 'multiple') && state.childAge.length === 0) {
                const ok = confirm('你还没选孩子年龄段哦，确定不选吗？');
                if (!ok) return;
            }

            // 构建跳转参数
            const params = new URLSearchParams();
            params.set('marriage', state.marriage);
            params.set('hasChild', state.hasChild);
            if (state.childAge.length > 0) {
                params.set('childAge', state.childAge.join(','));
            }

            console.log('开始预演，参数：', state);
            alert('进入对应题库！\n' + params.toString());
            // 实际项目中：window.location.href = '/quiz?' + params.toString();
        }

        // 跳过
        function handleSkip() {
            console.log('跳过收集，进入通用题库');
            alert('进入通用题库（跳过信息收集）');
            // 实际项目中：window.location.href = '/quiz?type=generic';
        }

        // 页面加载后延迟检查动画
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.querySelectorAll('.msg-bubble').forEach((el, i) => {
                    el.style.animationDelay = (i * 0.15) + 's';
                });
            }, 100);
        });
    </script>
</body>
</html>
